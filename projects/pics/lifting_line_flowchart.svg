<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 580" width="420" height="580">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#1e3c72"/>
    </marker>
    <style>
      .box { fill: #e8f4fc; stroke: #1e88e5; stroke-width: 1.5; }
      .startend { fill: #1e3c72; stroke: #1e3c72; }
      .startend-text { fill: white; font: bold 11px 'Segoe UI', sans-serif; }
      .decision { fill: #fff8e1; stroke: #f9a825; stroke-width: 1.5; }
      .text { fill: #1e3c72; font: 10px 'Segoe UI', sans-serif; text-anchor: middle; }
      .small { font-size: 9px; fill: #2a5298; }
      .title { font: bold 12px 'Segoe UI', sans-serif; fill: #1e3c72; text-anchor: middle; }
    </style>
  </defs>
  <!-- Title -->
  <text x="210" y="22" class="title">Lifting Line Iterative Solution</text>
  <!-- Start -->
  <rect x="160" y="32" width="100" height="32" rx="16" class="startend"/>
  <text x="210" y="52" class="startend-text">Start</text>
  <!-- Step 1: Initialize -->
  <path d="M210 64 L210 82" stroke="#1e3c72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="100" y="82" width="220" height="44" rx="6" class="box"/>
  <text x="210" y="98" class="text">1. Initialize: circulation from geometric AOA</text>
  <text x="210" y="112" class="small">Gamma = C_l V_inf c / 2 (zero induced velocity)</text>
  <!-- Step 2: Trailing vortex -->
  <path d="M210 126 L210 144" stroke="#1e3c72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="80" y="144" width="260" height="40" rx="6" class="box"/>
  <text x="210" y="160" class="text">2. Trailing vortex: Gamma_t,i = Gamma_i - Gamma_i-1</text>
  <!-- Step 3: Induced velocity -->
  <path d="M210 184 L210 202" stroke="#1e3c72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="202" width="300" height="40" rx="6" class="box"/>
  <text x="210" y="218" class="text">3. Induced velocity (Biot-Savart): w_i = sum Gamma_t,j/(4 pi r)</text>
  <!-- Step 4: Effective AOA -->
  <path d="M210 242 L210 260" stroke="#1e3c72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="70" y="260" width="280" height="40" rx="6" class="box"/>
  <text x="210" y="276" class="text">4. Effective AOA: alpha_eff = alpha_g - alpha_i</text>
  <!-- Step 5: Interpolate C_l -->
  <path d="M210 300 L210 318" stroke="#1e3c72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="90" y="318" width="240" height="36" rx="6" class="box"/>
  <text x="210" y="334" class="text">5. Interpolate C_l(alpha_eff) from NACA 0012 data</text>
  <!-- Step 6: Update Gamma -->
  <path d="M210 354 L210 372" stroke="#1e3c72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="110" y="372" width="200" height="36" rx="6" class="box"/>
  <text x="210" y="390" class="text">6. Update Gamma = C_l V_inf c / 2</text>
  <!-- Step 7: Convergence decision -->
  <path d="M210 408 L210 426" stroke="#1e3c72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polygon points="210,426 310,476 210,526 110,476" class="decision"/>
  <text x="210" y="468" class="text">|dGamma/Gamma| &lt; 0.05%?</text>
  <text x="210" y="482" class="small">Converged?</text>
  <!-- Yes -> End -->
  <path d="M210 526 L210 544" stroke="#1e3c72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="160" y="544" width="100" height="32" rx="16" class="startend"/>
  <text x="210" y="564" class="startend-text">End</text>
  <!-- No -> back to step 2 -->
  <path d="M110 476 L50 476 L50 164 L80 164" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
  <text x="42" y="318" class="small" text-anchor="middle" transform="rotate(-90 42 318)">No: iterate</text>
</svg>
